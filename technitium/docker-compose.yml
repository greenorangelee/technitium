services:
  dns-server:
    image: technitium/dns-server:latest
    container_name: technitium-dns
    hostname: dns-server
    restart: unless-stopped
    ports:
      # ── 웹 콘솔 ──────────────────────────────────────────────
      - "5380:5380/tcp"       # DNS 웹 콘솔 (HTTP)
      # - "53443:53443/tcp"   # DNS 웹 콘솔 (HTTPS) — 리버스 프록시 설정 후 활성화
      # ── 기본 DNS ─────────────────────────────────────────────
      - "53:53/udp"
      - "53:53/tcp"
      # ── 암호화 프로토콜 (나중에 주석 해제) ───────────────────
      # - "853:853/udp"       # DNS-over-QUIC
      # - "853:853/tcp"       # DNS-over-TLS
      # - "443:443/udp"       # DNS-over-HTTPS (HTTP/3)
      # - "443:443/tcp"       # DNS-over-HTTPS (HTTP/1.1, HTTP/2)
      # - "8053:8053/tcp"     # DNS-over-HTTP (리버스 프록시 연동용)
    environment:
      # ── 기본 설정 ────────────────────────────────────────────
      - DNS_SERVER_DOMAIN=${DNS_SERVER_DOMAIN}
      - DNS_SERVER_LOG_USING_LOCAL_TIME=true
      - DNS_SERVER_LOG_FOLDER_PATH=/var/log/technitium/dns
      # ── 관리자 비밀번호 ───────────────────────────────────────
      - DNS_SERVER_ADMIN_PASSWORD=${DNS_SERVER_ADMIN_PASSWORD}
      # ── 재귀 쿼리: 내부 네트워크만 허용 ─────────────────────
      - DNS_SERVER_RECURSION=AllowOnlyForPrivateNetworks
      # ── 광고 차단 ────────────────────────────────────────────
      - DNS_SERVER_ENABLE_BLOCKING=true
      # - DNS_SERVER_ALLOW_TXT_BLOCKING_REPORT=false
      # ── 업스트림 포워더 (주석 해제 시 재귀 대신 사용) ────────
      # - DNS_SERVER_FORWARDERS=1.1.1.1, 8.8.8.8
      # - DNS_SERVER_FORWARDER_PROTOCOL=Tcp
      # ── 리버스 프록시 연동 시 활성화 ─────────────────────────
      # - DNS_SERVER_OPTIONAL_PROTOCOL_DNS_OVER_HTTP=false
      # ── 통계·로그 보존 기간 ───────────────────────────────────
      # - DNS_SERVER_STATS_MAX_STAT_FILE_DAYS=90
      # - DNS_SERVER_LOG_MAX_LOG_FILE_DAYS=90
    volumes:
      - /home/docker/dockhand/data/stacks/technitium-dns/config:/etc/dns
      - /home/docker/dockhand/data/stacks/technitium-dns/logs:/var/log/technitium/dns
    healthcheck:
      test: ["CMD-SHELL", "netstat -tlnp 2>/dev/null | grep 5380 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    sysctls:
      - net.ipv4.ip_local_port_range=1024 65535
